<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ページタイトル -->
  <title>セルフオーダー（QR対応）</title>

  <!-- 外部CSS読み込み（キャッシュ対策付き） -->
  <link rel="stylesheet" href="style.css?v=1">
</head>

<body>

  <!-- ===============================
       ページタイトル表示
  =============================== -->
  <h1>セルフオーダーQR</h1>

  <!-- QRから取得したテーブル番号表示 -->
  <p id="tableDisplay"
     style="text-align:center; font-size:1.2em; color:#d86c9b;">
  </p>

  <!-- ===============================
       注文フォーム
  =============================== -->
  <form id="orderForm">

    <!-- テーブル番号（QRから自動取得） -->
    <input type="hidden" id="table" name="table" value="">

    <!-- ▼カテゴリタブ -->
    <div id="categoryTabs"
         style="display:flex; gap:8px; margin-bottom:16px;">
    </div>

    <!-- メニュー一覧 -->
    <div class="menu-container" id="menuContainer"></div>

    <!-- 店への連絡欄 -->
    <label for="message">お店への連絡</label>
    <textarea id="message"
              name="message"
              placeholder="アレルギー、テーブル上の要望など">
    </textarea>

    <!-- 送信エリア -->
    <div class="submit-row">
      <button type="submit" id="submitBtn" disabled>
        注文を送信
      </button>

      <!-- 送信後メッセージ -->
      <p id="thanksMessage" style="display: none;">
        ご注文ありがとうございました。
      </p>
    </div>

  </form>

  <!-- ===============================
       注文履歴表示エリア
  =============================== -->
  <div id="history">
    <h2>注文履歴</h2>
    <div id="historyList"></div>
  </div>

  <script>

    // ===============================
    // 現在のカテゴリ
    // ===============================
    let currentCategory = "";

    // ===============================
    // カテゴリタブ生成
    // ===============================
    function renderCategoryTabs() {

      const tabs = document.getElementById("categoryTabs");

      // カテゴリ一覧取得（重複排除）
      const categories = [...new Set(menuMaster.map(m => m.category))];

      tabs.innerHTML = "";

      categories.forEach((cat, index) => {

        const btn = document.createElement("button");

        btn.type = "button"; // ←これでsubmit防止
        btn.textContent = cat;

        // 初期選択
        if (index === 0) {
          btn.classList.add("active");
          currentCategory = cat;
        }

        // クリック時処理
        btn.onclick = () => {

          currentCategory = cat;

          // active切替
          document.querySelectorAll("#categoryTabs button")
            .forEach(b => b.classList.remove("active"));

          btn.classList.add("active");

          renderMenus(); // 再描画
        };

        tabs.appendChild(btn);
      });
    }

    // ===============================
    // メニュー管理
    // ===============================
    let menuMaster = [];

    // メニュー取得（Supabase）
    async function fetchMenus() {

      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/menus?is_active=eq.true`,
        {
          headers: {
            "apikey": SUPABASE_API_KEY,
            "Authorization": `Bearer ${SUPABASE_API_KEY}`
          }
        }
      );

      menuMaster = await res.json();
    }

    // ===============================
    // メニュー描画
    // ===============================
    function renderMenus() {

      const container = document.getElementById("menuContainer");
      container.innerHTML = "";

      // カテゴリでフィルタ
      const filteredMenus = currentCategory
        ? menuMaster.filter(menu => menu.category === currentCategory)
        : menuMaster;

      filteredMenus.forEach(menu => {

        const div = document.createElement("div");
        div.className = "menu-item";

        // メニューHTML生成
        div.innerHTML = `
          <img src="${menu.image_url}" alt="${menu.name}">
          <div class="menu-select">
            <label>${menu.name}（¥${menu.price}）</label>
            <select name="menu_${menu.id}">
              <option value="0">選択してください</option>
              <option value="1">1個</option>
              <option value="2">2個</option>
            </select>
          </div>
        `;

        container.appendChild(div);
      });

      // フォーム状態更新
      form.dispatchEvent(new Event('change'));
    }

    // ===============================
    // DOM取得
    // ===============================
    const form = document.getElementById('orderForm');
    const submitBtn = document.getElementById('submitBtn');

    // ===============================
    // Supabase 接続情報
    // ===============================
    const SUPABASE_URL = "https://flefnottwzsbihgrqrqk.supabase.co";
    const SUPABASE_TABLE = "orders";
    const SUPABASE_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZsZWZub3R0d3pzYmloZ3JxcnFrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxOTgxNzMsImV4cCI6MjA4OTc3NDE3M30.gvqf7_VRMZiPcGmQsWk_DCEJ0JmD_wcCCVzl-L9URKc";

    let currentTableNumber = null;

    // ===============================
    // フォーム変更時
    // ===============================
    form.addEventListener('change', () => {

      let hasOrder = false;

      menuMaster.forEach(menu => {

        const el = form[`menu_${menu.id}`];
        if (!el) return;

        const qty = parseInt(el.value || 0);

        if (qty > 0) hasOrder = true;
      });

      const hasTable = form.table.value !== "";

      // 両方満たしたら有効化
      submitBtn.disabled = !(hasOrder && hasTable);
    });

    // ===============================
    // 注文送信処理
    // ===============================
    form.addEventListener('submit', async (e) => {

      e.preventDefault();

      const items = [];

      const orderData = {
        table_number: form.table.value,
        message: form.message.value.trim(),
        session_id: currentSessionId // ←追加
      };

      // 選択されたメニュー収集
      menuMaster.forEach(menu => {

        const el = form[`menu_${menu.id}`];
        if (!el) return;

        const qty = parseInt(el.value || 0);

        if (qty > 0) {
          items.push({
            name: menu.name,
            quantity: qty,
            price: menu.price
          });
        }
      });

      // 未選択チェック
      if (items.length === 0) {
        alert('メニューを1つ以上選択してください。');
        return;
      }

      try {

        // 注文登録
        const orderRes = await fetch(
          `${SUPABASE_URL}/rest/v1/orders`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_API_KEY,
              "Authorization": `Bearer ${SUPABASE_API_KEY}`,
              "Prefer": "return=representation"
            },
            body: JSON.stringify(orderData)
          }
        );

        const orderResult = await orderRes.json();
        const orderId = orderResult[0]?.id;

        if (!orderId) {
          throw new Error('注文IDを取得できませんでした');
        }

        // 明細生成
        const itemsWithOrderId = items.map(item => ({
          order_id: orderId,
          item_name: item.name,
          quantity: item.quantity,
          price: item.price
        }));

        // 明細登録
        const itemsRes = await fetch(
          `${SUPABASE_URL}/rest/v1/order_items`,
          {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "apikey": SUPABASE_API_KEY,
              "Authorization": `Bearer ${SUPABASE_API_KEY}`
            },
            body: JSON.stringify(itemsWithOrderId)
          }
        );

        // 成功処理
        if (orderRes.ok && itemsRes.ok) {

          alert("ご注文ありがとうございました！");

          form.reset();
          submitBtn.disabled = true;

          document.getElementById('thanksMessage').style.display = 'block';

          fetchOrderHistory(orderData.table_number);

        } else {

          alert("送信エラーが発生しました。");
          console.error(await orderRes.text(), await itemsRes.text());
        }

      } catch (error) {

        alert("通信エラーが発生しました。");
        console.error(error);
      }
    });

    // ===============================
    // メニュー検索
    // ===============================
    function findMenu(name) {
      return menuMaster.find(m => m.name === name);
    }

    // ===============================
    // 初期処理
    // ===============================


    let currentSessionId = null;

    window.addEventListener('DOMContentLoaded', async () => {

      await fetchMenus();

      renderCategoryTabs();
      renderMenus();

      // URLパラメータ取得
      const params = new URLSearchParams(window.location.search);
      const tableParam = params.get('table');
      const sessionParam = params.get('session'); // ←追加
      // ===============================
      // ★ ここに追加（最重要）
      // ===============================
      if (!sessionParam) {
        alert("QRを読み直してください");
        return;
      }
      // ★これを追加
      if (sessionParam) {
        currentSessionId = sessionParam;
      }
      //console.log("session:", currentSessionId);
      if (tableParam) {

        const tableInput = document.getElementById('table');

        tableInput.value = tableParam;
        currentTableNumber = tableParam;

        tableInput.dispatchEvent(new Event('change'));

        document.getElementById('tableDisplay').textContent =
          `テーブル番号：${tableParam}`;

        fetchOrderHistory();

        // 定期更新
        setInterval(() => {
          fetchOrderHistory();
        }, 2500);
      }

      // フォーカス時更新
      window.addEventListener('focus', () => {
        if (currentTableNumber)
          fetchOrderHistory();
      });
    });

    // ===============================
    // 注文履歴取得
    // ===============================
async function fetchOrderHistory() {

  try {

    // ===============================
    // ★ セッションチェック（重要）
    // ===============================
    if (!currentSessionId) {
      console.error("session_idが無い");
      return;
    }

    // ===============================
    // ★ URL確認ログ
    // ===============================
    const url = `${SUPABASE_URL}/rest/v1/orders?session_id=eq.${currentSessionId}&is_hidden=eq.false&is_cancelled=eq.false&select=*,order_items(*)&order=created_at.desc`;

    console.log("fetch URL:", url);

    const res = await fetch(url, {
      headers: {
        "apikey": SUPABASE_API_KEY,
        "Authorization": `Bearer ${SUPABASE_API_KEY}`,
        "Cache-Control": "no-cache"
      },
      cache: "no-store"
    });

    // ===============================
    // ★ ステータス確認
    // ===============================
    console.log("status:", res.status);

    const data = await res.json();

    console.log("response:", data);

    // ===============================
    // ★ 配列チェック（ここがエラー対策）
    // ===============================
    if (!Array.isArray(data)) {
      console.error("配列じゃない（エラー内容）:", data);
      return;
    }

    const orders = data;

    const historyList = document.getElementById("historyList");
    historyList.innerHTML = "";

    if (orders.length === 0) {
      historyList.innerHTML = "<p>注文履歴がありません。</p>";
      return;
    }

    for (const order of orders) {

      const item = document.createElement("div");
      item.className = "history-item";

      let menuHTML = "";

      if (order.order_items && order.order_items.length > 0) {
        order.order_items.forEach(i => {
          menuHTML += `
            <span class="tag">
              ${i.item_name}
              <span class="count">×${i.quantity}</span>
              （¥${i.price * i.quantity}）
            </span>
          `;
        });
      }

      let messageHTML = "";
      if (order.message) {
        messageHTML =
          `<div class="history-message">📝 ${order.message}</div>`;
      }

      const time = new Date(order.created_at);

      const formattedTime = time.toLocaleString("ja-JP", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });

      item.innerHTML = `
        <div class="history-time">🕒 ${formattedTime}</div>
        <div class="history-content">${menuHTML}</div>
        ${messageHTML}
      `;

      historyList.appendChild(item);
    }

  } catch (error) {
    console.error("注文履歴の取得に失敗しました:", error);
  }
}

  </script>

</body>
</html>
